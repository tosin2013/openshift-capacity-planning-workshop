# Showroom Lab Guide Configuration
showroom:
  enabled: true
  namespace: showroom
  name: showroom

  # Lab guide Git repository
  content:
    repoUrl: "https://github.com/rhpds/showroom_template_nookbag.git"
    repoRef: "main"
    antoraPlaybook: "site.yml"
    image: "quay.io/rhpds/showroom-content:v1.3.1"

  # Nookbag bundle (enables LlamaStack, multiple terminals, Zero Trust UI)
  nookbag:
    enabled: true
    bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.2.1/nookbag-v0.2.1.zip"

  # Terminal configuration
  # In hub-student topology, targetUrl points to the student cluster API endpoint.
  # This value is injected post-provision by the hub wiring step:
  #   agd provision --config openshift-workloads --vars hub-aws-workloads.yml
  # Leave empty for single-cluster mode (terminal targets its own cluster).
  terminal:
    enabled: true
    targetUrl: ""       # injected: student cluster API URL (e.g. https://api.student-01.sandbox5388.opentlc.com:6443)
    image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

# Injected by parent chart
deployer:
  domain: ""

# Used by userdata ConfigMap
demo:
  namespace: ""
  appName: ""
