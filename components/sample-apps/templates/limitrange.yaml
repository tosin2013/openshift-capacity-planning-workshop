---
# LimitRange - Default requests/limits for pods without resources (Module 3)
apiVersion: v1
kind: LimitRange
metadata:
  name: capacity-workshop-limits
  namespace: {{ .Values.namespace }}
  labels:
    demo.redhat.com/application: capacity-workshop
spec:
  limits:
  - type: Container
    default:
      # Default limits (if not specified)
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      # Default requests (if not specified)
      cpu: 100m
      memory: 128Mi
    max:
      # Maximum allowed
      cpu: "4"
      memory: 8Gi
    min:
      # Minimum allowed
      cpu: 10m
      memory: 64Mi
  - type: Pod
    max:
      cpu: "8"
      memory: 16Gi
