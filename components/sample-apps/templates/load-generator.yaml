---
# Load Generator - HTTP load testing with wrk (Module 3, 6)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: {{ .Values.namespace }}
  labels:
    app: load-generator
    demo.redhat.com/application: capacity-workshop
spec:
  replicas: {{ .Values.loadGenerator.replicas }}
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: wrk
        image: williamyeh/wrk:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            TARGET_RPS="${TARGET_RPS:-100}"
            THREADS=4
            CONNS="${TARGET_RPS}"
            STRESS=0
            if [ "${TARGET_RPS}" -ge 500 ]; then
              THREADS=8
              STRESS=1
            fi
            echo "Load Generator - Capacity Planning Workshop"
            echo "Target: http://target-app:8080"
            echo "RPS Target: ${TARGET_RPS}  Threads: ${THREADS}  Connections: ${CONNS}"
            echo "Stress mode (continuous): ${STRESS}"
            echo ""
            while true; do
              echo "=== Load Test Started at $(date) ==="
              wrk -t${THREADS} -c${CONNS} -d30s --latency http://target-app:8080 || echo "Target not ready"
              echo "=== Test Complete ==="
              # In stress mode run continuously; in normal mode rest 60s between runs
              if [ "${STRESS}" -eq 0 ]; then
                echo "Sleeping 60s..."
                sleep 60
              fi
            done
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
        - name: TARGET_RPS
          value: "{{ .Values.loadGenerator.targetRPS }}"
