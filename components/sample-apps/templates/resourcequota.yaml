---
# ResourceQuota - Namespace capacity limits (Module 1, 6)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: capacity-workshop-quota
  namespace: {{ .Values.namespace }}
  labels:
    demo.redhat.com/application: capacity-workshop
spec:
  hard:
    # Compute resources
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    # Object counts
    pods: "100"
    services: "20"
    persistentvolumeclaims: "10"
    # Storage
    requests.storage: 100Gi
