---
# Critical Application - High priority, always running (Module 6)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-app
  namespace: {{ .Values.namespace }}
  labels:
    app: critical-app
    demo.redhat.com/application: capacity-workshop
    priority: high
spec:
  replicas: 2
  selector:
    matchLabels:
      app: critical-app
  template:
    metadata:
      labels:
        app: critical-app
        priority: high
    spec:
      priorityClassName: high-priority
      containers:
      - name: app
        image: registry.access.redhat.com/ubi9/httpd-24:latest
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Service for Critical App
apiVersion: v1
kind: Service
metadata:
  name: critical-app
  namespace: {{ .Values.namespace }}
  labels:
    demo.redhat.com/application: capacity-workshop
spec:
  selector:
    app: critical-app
  ports:
  - port: 80
    targetPort: 8080
    name: http
