---
# Critical Application - High priority, always running (Module 6)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-app
  namespace: {{ .Values.namespace }}
  labels:
    app: critical-app
    demo.redhat.com/application: capacity-workshop
    priority: high
spec:
  replicas: 2
  selector:
    matchLabels:
      app: critical-app
  template:
    metadata:
      labels:
        app: critical-app
        priority: high
    spec:
      priorityClassName: high-priority
      initContainers:
      - name: create-index
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo '<html><head><title>Critical App - Capacity Workshop</title></head><body><h1>Critical Application</h1><p>High Priority - Module 6</p><p>Status: Running</p></body></html>' > /var/www/html/index.html
            chmod 644 /var/www/html/index.html
        volumeMounts:
        - name: html-content
          mountPath: /var/www/html
        # Resources required to satisfy the namespace ResourceQuota admission check.
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      containers:
      - name: app
        image: registry.access.redhat.com/ubi9/httpd-24:latest
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: html-content
          mountPath: /var/www/html
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: html-content
        emptyDir: {}
---
# Service for Critical App
apiVersion: v1
kind: Service
metadata:
  name: critical-app
  namespace: {{ .Values.namespace }}
  labels:
    demo.redhat.com/application: capacity-workshop
spec:
  selector:
    app: critical-app
  ports:
  - port: 80
    targetPort: 8080
    name: http
