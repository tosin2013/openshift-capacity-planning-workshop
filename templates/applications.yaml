{{- if .Values.components.sampleApps.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-sample-apps
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: capacity-workshop
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/sample-apps
    helm:
      valuesObject:
        namespace: {{ .Values.global.namespace }}
        batchNamespace: capacity-batch
        loadGenerator:
          replicas: {{ .Values.components.sampleApps.loadGenerator.replicas }}
          targetRPS: {{ .Values.components.sampleApps.loadGenerator.targetRPS }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.global.namespace }}
  syncPolicy:
    automated:
      prune: false
      # selfHeal is intentionally false: students run oc set env / oc autoscale
      # as workshop exercises and those manual changes must persist. Without
      # selfHeal, ArgoCD auto-deploys the initial resources but never reverts
      # student modifications between poll cycles.
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
{{- end }}

{{- if .Values.components.nodeDensityConfig.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-node-density-config
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: capacity-workshop
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/node-density-config
    helm:
      valuesObject:
        maxPods: {{ .Values.components.nodeDensityConfig.maxPods }}
        machineConfigPool: worker
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-machine-config-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}

