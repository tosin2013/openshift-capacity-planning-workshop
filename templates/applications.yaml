# App of Apps Pattern - Capacity Planning Workshop
# This template generates ArgoCD Applications for each enabled component

{{- if .Values.components.rhacm.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-rhacm
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: capacity-workshop
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/rhacm
    helm:
      valuesObject:
        namespace: {{ .Values.components.rhacm.namespace }}
        observability:
          enabled: {{ .Values.components.rhacm.observability.enabled }}
          storageClass: {{ .Values.components.rhacm.observability.storageClass }}
          retentionDays: {{ .Values.components.rhacm.observability.retentionDays }}
          retentionResolutionRaw: {{ .Values.components.rhacm.observability.retentionResolutionRaw }}
          retentionLocal: {{ .Values.components.rhacm.observability.retentionLocal }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.components.rhacm.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
{{- end }}

{{- if .Values.components.monitoringConfig.enabled }}
